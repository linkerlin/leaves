name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache-dependency-path: go.sum

      - name: go test
        run: go test ./...

  wasm:
    name: wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: build wasm demo
        run: go build -o examples/wasm/leaves.wasm ./examples/wasm

  bench-gate:
    name: backend bench gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: batch=1 BornCPU slower than Native (>=20x)
        run: go test -run TestBenchGateBornCPUSlowerBatch1 -count=1 -timeout 5m
